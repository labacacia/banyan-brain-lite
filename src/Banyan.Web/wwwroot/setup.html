<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banyan — Admin setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <style>
    .setup-shell {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .setup-card {
      width: min(460px, 100%);
      background: linear-gradient(180deg, var(--ink-1), var(--ink-0));
      border: 1px solid var(--ink-line);
      border-radius: 14px;
      padding: 1.75rem 2rem 2rem;
      box-shadow: 0 0 0 1px rgba(76,194,255,0.05), 0 30px 60px -20px rgba(0,0,0,0.6);
    }
    .setup-card h1 {
      margin: 0 0 0.25rem; font-size: 1.5rem; letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--blue-2), var(--pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .setup-card .sub { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
    .setup-card label { display: block; font-size: 0.78rem; color: var(--text-2); margin: 0.85rem 0 0.35rem; letter-spacing: 0.4px; }
    .setup-card input {
      width: 100%; padding: 0.7rem 0.85rem; background: var(--ink-2);
      border: 1px solid var(--ink-line); border-radius: 8px; color: var(--text);
      font-family: 'Space Grotesk', system-ui; font-size: 0.95rem;
    }
    .setup-card input:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow-soft);
    }
    .setup-card button[type="submit"] {
      width: 100%; margin-top: 1.5rem; padding: 0.75rem; border-radius: 8px;
      border: none; cursor: pointer; font-weight: 600; letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--blue-2), var(--pink));
      color: #001528;
    }
    .setup-card button[type="submit"]:hover { filter: brightness(1.1); }
    .setup-card .msg {
      margin-top: 1rem; padding: 0.6rem 0.8rem; border-radius: 6px;
      font-size: 0.85rem; display: none;
    }
    .setup-card .msg.show { display: block; }
    .setup-card .msg.err {
      background: rgba(255, 51, 102, 0.12); border: 1px solid rgba(255, 51, 102, 0.4);
      color: var(--bad);
    }
    .setup-card .msg.ok {
      background: rgba(0, 255, 161, 0.1); border: 1px solid rgba(0, 255, 161, 0.35);
      color: var(--good);
    }
    .setup-card .footnote {
      margin-top: 1.4rem; padding-top: 1.1rem; border-top: 1px solid var(--ink-line);
      font-size: 0.78rem; color: var(--muted); line-height: 1.5;
    }
  </style>
</head>
<body>
  <canvas id="bg-particles"></canvas>
  <div class="setup-shell">
    <form class="setup-card" id="setup-form">
      <h1>🌳 Banyan setup</h1>
      <p class="sub">Create the first admin account for this node.</p>
      <label for="u">Admin username</label>
      <input id="u" name="username" autocomplete="username" required value="admin" autofocus />
      <label for="p">Admin password</label>
      <input id="p" name="password" type="password" autocomplete="new-password" minlength="10" required />
      <label for="pc">Confirm password</label>
      <input id="pc" name="confirm-password" type="password" autocomplete="new-password" minlength="10" required />
      <button type="submit">Create admin</button>
      <div class="msg" id="msg"></div>
      <div class="footnote">
        The identity database and signing key are created locally on this host.
      </div>
    </form>
  </div>
  <script>
    const c = document.getElementById('bg-particles');
    if (c) {
      const ctx = c.getContext('2d');
      let w = c.width = innerWidth, h = c.height = innerHeight;
      const N = 60, P = Array.from({length: N}, () => ({
        x: Math.random()*w, y: Math.random()*h,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
      }));
      addEventListener('resize', () => { w = c.width = innerWidth; h = c.height = innerHeight; });
      function frame() {
        ctx.clearRect(0,0,w,h);
        for (const p of P) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.fillStyle = 'rgba(76,194,255,0.6)';
          ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI*2); ctx.fill();
        }
        for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
          const a = P[i], b = P[j], d = Math.hypot(a.x-b.x, a.y-b.y);
          if (d < 130) {
            ctx.strokeStyle = `rgba(255,77,141,${(1 - d/130)*0.18})`;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
        requestAnimationFrame(frame);
      }
      frame();
    }

    const form = document.getElementById('setup-form');
    const msg = document.getElementById('msg');
    const show = (text, kind) => {
      msg.textContent = text;
      msg.className = `msg ${kind} show`;
    };

    (async () => {
      const r = await fetch('/api/setup/status', { credentials: 'same-origin' }).catch(() => null);
      if (!r || !r.ok) return;
      const status = await r.json();
      if (!status.setupRequired) location.replace('/login.html');
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('u').value.trim() || 'admin';
      const password = document.getElementById('p').value;
      const confirm = document.getElementById('pc').value;
      if (password !== confirm) {
        show('Passwords do not match.', 'err');
        return;
      }
      try {
        const setup = await fetch('/api/setup/admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });
        if (!setup.ok) {
          const body = await setup.json().catch(() => ({}));
          show(body.message || `Setup failed (${setup.status})`, 'err');
          return;
        }

        const login = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });
        if (!login.ok) {
          show('Admin created. Sign in with the new password.', 'ok');
          setTimeout(() => location.href = '/login.html', 800);
          return;
        }
        location.href = '/';
      } catch (ex) {
        show('Network error: ' + ex.message, 'err');
      }
    });
  </script>
</body>
</html>
