<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banyan — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-shell {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      width: min(420px, 100%);
      background: linear-gradient(180deg, var(--ink-1), var(--ink-0));
      border: 1px solid var(--ink-line);
      border-radius: 14px;
      padding: 1.75rem 2rem 2rem;
      box-shadow: 0 0 0 1px rgba(76,194,255,0.05), 0 30px 60px -20px rgba(0,0,0,0.6);
    }
    .login-card h1 {
      margin: 0 0 0.25rem; font-size: 1.5rem; letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--blue-2), var(--pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .login-card .sub { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
    .login-card label { display: block; font-size: 0.78rem; color: var(--text-2); margin: 0.85rem 0 0.35rem; letter-spacing: 0.4px; }
    .login-card input {
      width: 100%; padding: 0.7rem 0.85rem; background: var(--ink-2);
      border: 1px solid var(--ink-line); border-radius: 8px; color: var(--text);
      font-family: 'Space Grotesk', system-ui; font-size: 0.95rem;
    }
    .login-card input:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow-soft);
    }
    .login-card button[type="submit"] {
      width: 100%; margin-top: 1.5rem; padding: 0.75rem; border-radius: 8px;
      border: none; cursor: pointer; font-weight: 600; letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--blue-2), var(--pink));
      color: #001528;
    }
    .login-card button[type="submit"]:hover { filter: brightness(1.1); }
    .login-card .err {
      margin-top: 1rem; padding: 0.6rem 0.8rem; border-radius: 6px;
      background: rgba(255, 51, 102, 0.12); border: 1px solid rgba(255, 51, 102, 0.4);
      color: var(--bad); font-size: 0.85rem; display: none;
    }
    .login-card .err.show { display: block; }
    .login-card .footnote {
      margin-top: 1.4rem; padding-top: 1.1rem; border-top: 1px solid var(--ink-line);
      font-size: 0.78rem; color: var(--muted); line-height: 1.5;
    }
    .login-card .footnote code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      color: var(--text-2); background: var(--ink-2);
      padding: 0.05rem 0.35rem; border-radius: 4px;
    }
  </style>
</head>
<body>
  <canvas id="bg-particles"></canvas>
  <div class="login-shell">
    <form class="login-card" id="login-form">
      <h1>🌳 Banyan</h1>
      <p class="sub">Sign in to manage agents, the CA, and identity.</p>
      <label for="u">Username</label>
      <input id="u" name="username" autocomplete="username" required autofocus />
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <div class="err" id="err"></div>
      <div class="footnote">
        Operators can also use <code>banyan login</code> from the CLI (Device Code flow).
        Memory and Agents reads stay public if NID auth is set to <code>anonymous-allowed</code>.
      </div>
    </form>
  </div>
  <script>
    // Reuse the same particle background as the main UI for visual continuity.
    const c = document.getElementById('bg-particles');
    if (c) {
      const ctx = c.getContext('2d');
      let w = c.width = innerWidth, h = c.height = innerHeight;
      const N = 60, P = Array.from({length: N}, () => ({
        x: Math.random()*w, y: Math.random()*h,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
      }));
      addEventListener('resize', () => { w = c.width = innerWidth; h = c.height = innerHeight; });
      function frame() {
        ctx.clearRect(0,0,w,h);
        for (const p of P) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.fillStyle = 'rgba(76,194,255,0.6)';
          ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI*2); ctx.fill();
        }
        for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
          const a = P[i], b = P[j], d = Math.hypot(a.x-b.x, a.y-b.y);
          if (d < 130) {
            ctx.strokeStyle = `rgba(255,77,141,${(1 - d/130)*0.18})`;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
        requestAnimationFrame(frame);
      }
      frame();
    }

    const form = document.getElementById('login-form');
    const err  = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      const username = document.getElementById('u').value.trim();
      const password = document.getElementById('p').value;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          err.textContent = body.message || `Sign-in failed (${r.status})`;
          err.classList.add('show');
          return;
        }
        // Cookie is set by the server; redirect to the main UI.
        location.href = '/';
      } catch (ex) {
        err.textContent = 'Network error: ' + ex.message;
        err.classList.add('show');
      }
    });
  </script>
</body>
</html>
